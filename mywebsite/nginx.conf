server {
    listen 80;
    server_name jassim-dev.duckdns.org www.jassim-dev.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name jassim-dev.duckdns.org www.jassim-dev.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/jassim-dev.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jassim-dev.duckdns.org/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
